name: Swag Labs E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Restore dependencies
        run: dotnet restore src/SwagLabs.slnx

      - name: Build
        run: dotnet build src/SwagLabs.slnx --no-restore

      - name: Run Tests
        run: dotnet test src/SwagLabs.Definitions/SwagLabs.Definitions.csproj --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"
